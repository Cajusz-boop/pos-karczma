name: Deploy to Hetzner

on:
  workflow_dispatch:  # Tylko ręczne uruchomienie; webhook jest główną metodą deployu

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 65.108.245.25
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/pos
            git pull origin master
            npm install
            npx prisma generate
            npm run build
            pm2 restart pos-karczma --update-env
            pm2 save
            sleep 10
            curl -sf --max-time 15 http://127.0.0.1:3001/api/health || (pm2 logs pos-karczma --lines 30 --nostream; exit 1)
