name: Deploy to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 65.108.245.25
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/pos
            git pull origin master
            npm install
            npx prisma generate
            npm run build
            pm2 restart pos-karczma
