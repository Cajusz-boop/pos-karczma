<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Karczma - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #895a3a 0%, #5a3a25 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: white;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        
        .retry-btn {
            background: white;
            color: #895a3a;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .retry-btn:active {
            transform: scale(0.95);
        }
        
        .retry-btn:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .status {
            margin-top: 24px;
            font-size: 14px;
            opacity: 0.7;
        }
        
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #895a3a;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .retry-btn.loading .spinner {
            display: inline-block;
        }
        
        .retry-btn.loading .btn-text {
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
        </svg>
        
        <h1>Brak połączenia z serwerem</h1>
        
        <p>
            Nie można połączyć się z serwerem deweloperskim. 
            Upewnij się, że serwer jest uruchomiony i urządzenie jest w tej samej sieci WiFi.
        </p>
        
        <button class="retry-btn" onclick="retry()">
            <span class="btn-text">Spróbuj ponownie</span>
            <span class="spinner"></span>
        </button>
        
        <div class="status" id="status">Ostatnia próba: nigdy</div>
    </div>
    
    <script>
        let retryCount = 0;
        const serverUrl = 'http://10.119.169.20:3000';
        
        async function retry() {
            const btn = document.querySelector('.retry-btn');
            const status = document.getElementById('status');
            
            btn.classList.add('loading');
            btn.disabled = true;
            retryCount++;
            
            status.textContent = `Próba ${retryCount}... Łączenie z serwerem...`;
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(serverUrl + '/api/ping', {
                    method: 'HEAD',
                    mode: 'no-cors',
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                status.textContent = 'Połączono! Przekierowuję...';
                setTimeout(() => {
                    window.location.href = serverUrl;
                }, 500);
                
            } catch (e) {
                const now = new Date().toLocaleTimeString('pl-PL');
                status.textContent = `Błąd połączenia. Ostatnia próba: ${now}`;
                
                btn.classList.remove('loading');
                btn.disabled = false;
                
                if (retryCount < 3) {
                    setTimeout(retry, 2000);
                }
            }
        }
        
        setTimeout(retry, 1000);
        
        setInterval(() => {
            if (!document.querySelector('.retry-btn').disabled) {
                retry();
            }
        }, 10000);
    </script>
</body>
</html>
