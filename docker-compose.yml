# =============================================================================
# POS Karczma Łabędź — Docker Compose (Production)
# =============================================================================
# Uruchomienie:
#   docker compose up -d
#
# Rollback:
#   docker compose down
#   docker compose up -d --build   # rebuild z ostatniego kodu
#   lub: docker compose pull && docker compose up -d  # jeśli z registry
# =============================================================================

services:
  # MariaDB Database
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-pos_karczma_root}
      MARIADB_DATABASE: ${DB_NAME:-pos_karczma}
      MARIADB_USER: ${DB_USER:-pos_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-pos_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./backups:/backups
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pos-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER:-pos_user}:${DB_PASSWORD:-pos_password}@db:3306/${DB_NAME:-pos_karczma}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-minimum-32-chars}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos-network

  # Nginx Reverse Proxy (SSL/HTTPS)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/app/uploads:ro
    networks:
      - pos-network

volumes:
  db_data:
  uploads:
  backups:

networks:
  pos-network:
    driver: bridge
